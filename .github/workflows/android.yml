name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libsqlite3-dev \
          tk-dev \
          libgdbm-dev \
          libc6-dev \
          libbz2-dev \
          libffi-dev \
          zlib1g-dev \
          liblzma-dev \
          libncurses5-dev \
          libreadline-dev \
          libssl-dev \
          wget \
          curl \
          git \
          unzip \
          zip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo6 \
          cmake \
          libffi-dev \
          libssl-dev \
          python3-dev \
          python3-pip \
          python3-setuptools \
          python3-venv \
          libusb-1.0-0-dev
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer Cython==0.29.33

    - name: Build with Buildozer
      run: |
        cd mobile
        cp ../protocol.py .
        # Crea il file per le licenze e avvia la build
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        buildozer -v android debug
      env:
        BUILDOZER_ACCEPT_SDK_LICENSE: 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CrossLink-APK
        path: mobile/bin/*.apk
