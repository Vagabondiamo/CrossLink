name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            gettext \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            liblzma-dev \
            tk-dev \
            libgdbm-dev \
            libc6-dev \
            libdb-dev \
            libreadline-dev \
            libexpat1-dev \
            libmpdec-dev \
            ccache

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install --upgrade "Cython<3.0" buildozer

      - name: Setup Android SDK cmdline-tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/tools/bin
          cd $ANDROID_HOME/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          rm tools.zip
          mv cmdline-tools latest
          # Compatibilità Buildozer/Python-for-Android
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

      - name: Accept licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Build APK
        run: |
          cd mobile
          cp ../protocol.py .
          # In caso di problemi con i pacchetti su Ubuntu 24.04, forziamo buildozer a usare i propri strumenti
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: mobile/bin/*.apk
