name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk
    
    - name: Install Python dependencies
      run: |
        pip install buildozer
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p $ANDROID_HOME/licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > 
$ANDROID_HOME/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78afc2ea6e6b231531" >> 
$ANDROID_HOME/licenses/android-sdk-license
        echo "601085b94cd77f0b54ff86406957099ebe79c4d6" > 
$ANDROID_HOME/licenses/android-googletv-license
        echo "33b6a2b64607f11b759f320ef9dff4ae5f47d97a" > 
$ANDROID_HOME/licenses/google-gdk-license
        echo "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" > 
$ANDROID_HOME/licenses/mips-android-sysimage-license
    
    - name: Build Android APK
      run: |
        cd mobile
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: crosslink-apk
        path: mobile/bin/*.apk
